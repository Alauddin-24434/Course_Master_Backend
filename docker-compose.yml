services:
  app:
    build: .
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://coursemaster_user:coursemaster_pass@db:5432/coursemaster_db?schema=public
      - JWT_SECRET=super_secret_course_master_key_123
      - JWT_REFRESH_SECRET=refresh_super_secret_course_master_key_456
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=coursemaster_user
      - POSTGRES_PASSWORD=coursemaster_pass
      - POSTGRES_DB=coursemaster_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coursemaster_user -d coursemaster_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
