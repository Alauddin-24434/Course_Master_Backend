name: Deploy to Railway

on:
  push:
    branches:
      - main # Trigger deployment when code is pushed to the 'main' branch

jobs:
  deploy:
    runs-on: ubuntu-latest # Use the latest Ubuntu runner provided by GitHub
    steps:
      - name: Checkout Code
        # This step downloads your repository code onto the runner
        uses: actions/checkout@v4

      - name: Install Railway CLI
        # Install the Railway command line tool globally on the runner
        run: npm i -g @railway/cli

      - name: Deploy to Railway
        # --detach: Start the deployment and exit immediately without waiting for build completion
        # --service: Tells Railway which specific service to update
        run: railway up --service backend_app --detach 
        env:
          # Link the GitHub Secret 'course_master' to the Railway CLI for authentication
          RAILWAY_TOKEN: ${{ secrets.course_master }}
